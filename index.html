<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دیباچه هنر — دانشنامه جامع هنر</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep: #050d1a;
    --bg-dark: #0a1628;
    --bg-mid: #0f1e38;
    --bg-card: rgba(15,30,60,0.55);
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --glass-hover: rgba(255,255,255,0.07);
    --blue-bright: #4f8ef7;
    --blue-glow: #1d4ed8;
    --gold: #f5c842;
    --gold-soft: #e8b84b;
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --navbar-h: 64px;
  }
  html { font-size: 16px; }
  body {
    font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    direction: rtl;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(29,78,216,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(79,142,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 40%, rgba(245,200,66,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .glass {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
  }
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
  .app-main { flex: 1; padding-top: var(--navbar-h); }

  /* Navbar */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--navbar-h);
    background: rgba(5,13,26,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--glass-border); z-index: 100;
  }
  .navbar-inner {
    max-width: 1280px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 32px; padding: 0 24px;
  }
  .navbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; flex-shrink: 0; }
  .navbar-logo-icon { font-size: 24px; }
  .navbar-logo-text { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .navbar-links { display: flex; align-items: center; gap: 4px; flex: 1; }
  .nav-link { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 10px; text-decoration: none; color: var(--text-secondary); font-size: 0.88rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
  .nav-link:hover { background: var(--glass-hover); color: var(--text-primary); }
  .nav-link.active { background: rgba(79,142,247,0.15); color: var(--blue-bright); }

  /* Search Bar */
  .search-container { position: relative; }
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 7px 12px;
    transition: all 0.2s; max-width: 320px; width: 100%;
  }
  .search-bar.open { border-color: var(--blue-bright); background: rgba(255,255,255,0.08); }
  .search-bar svg { color: var(--text-muted); flex-shrink: 0; width: 16px; height: 16px; }
  .search-input {
    flex: 1; background: transparent; border: none; color: var(--text-primary);
    font-family: inherit; font-size: 0.82rem; outline: none; direction: rtl; padding: 0;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px; }
  .search-clear:hover { color: var(--text-primary); }
  .search-dropdown {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    z-index: 300; max-height: 400px; overflow-y: auto;
    border-radius: 16px; padding: 10px;
    display: flex; flex-direction: column; gap: 8px;
    min-width: 280px; background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .search-loading { display: flex; justify-content: center; padding: 20px; }
  .search-empty { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.85rem; }
  .search-group { display: flex; flex-direction: column; gap: 4px; }
  .search-group-title { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); padding: 4px 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .search-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-primary); text-align: right; font-family: inherit; font-size: 0.85rem; transition: all 0.15s; width: 100%; }
  .search-item:hover { background: rgba(255,255,255,0.05); }
  .search-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .search-avatar { width: 26px; height: 26px; border-radius: 50%; background: rgba(79,142,247,0.15); color: var(--blue-bright); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
  .search-item-name { flex: 1; font-weight: 500; }
  .search-item-meta { font-size: 0.72rem; color: var(--text-muted); }
  .spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid var(--glass-border); border-top-color: var(--blue-bright); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hero */
  .home-page { padding: 0 0 80px; }
  .hero {
    position: relative; min-height: 80vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; overflow: hidden; padding: 80px 24px 60px;
  }
  .hero-content { position: relative; z-index: 1; max-width: 700px; }
  .hero-badge {
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3);
    color: var(--blue-bright); font-size: 0.82rem; font-weight: 600; margin-bottom: 24px;
  }
  .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
  .hero-title-accent { background: linear-gradient(135deg, var(--blue-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-desc { font-size: 1.1rem; color: var(--text-secondary); line-height: 1.8; margin-bottom: 36px; }
  .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
    color: white; font-family: inherit; font-size: 0.9rem; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
    text-decoration: none; box-shadow: 0 4px 15px rgba(79,142,247,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.4); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 12px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-secondary); font-family: inherit; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  .btn-ghost:hover { background: var(--glass-hover); color: var(--text-primary); }
  .hero-stats { position: relative; z-index: 1; display: flex; gap: 20px; margin-top: 60px; flex-wrap: wrap; justify-content: center; }
  .stat-card { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 24px 36px; min-width: 130px; }
  .stat-num { font-size: 2rem; font-weight: 800; color: var(--text-primary); line-height: 1; }
  .stat-lbl { font-size: 0.8rem; color: var(--text-secondary); }

  /* Styles Grid */
  .home-section { max-width: 1200px; margin: 0 auto; padding: 60px 24px 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .section-title { font-size: 1.4rem; font-weight: 700; }
  .styles-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .style-preview-card {
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
  }
  .style-preview-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
  .spc-color { height: 4px; }
  .spc-body { padding: 14px 16px; }
  .spc-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
  .spc-period { font-size: 0.75rem; color: var(--text-muted); }

  /* Articles Grid */
  .articles-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .article-preview-card {
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    overflow: hidden; transition: transform 0.2s;
  }
  .article-preview-card:hover { transform: translateY(-3px); }
  .apc-cover { width: 100%; height: 160px; object-fit: cover; }
  .apc-body { padding: 16px; }
  .apc-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
  .apc-excerpt { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; }

  /* Styles Timeline Page */
  .styles-page { max-width: 1000px; margin: 0 auto; padding: 48px 24px 100px; }
  .styles-header { text-align: center; margin-bottom: 64px; }
  .styles-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
  .styles-sub { color: var(--text-secondary); font-size: 0.95rem; }
  .timeline-wrapper { position: relative; }
  .timeline-line {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(79,142,247,0.4) 5%, rgba(79,142,247,0.4) 95%, transparent);
    transform: translateX(-50%);
  }
  .timeline-items { display: flex; flex-direction: column; gap: 40px; }
  .timeline-row { display: grid; grid-template-columns: 1fr 20px 1fr; align-items: center; gap: 0; }
  .timeline-row.left .timeline-card { grid-column: 1; justify-self: end; max-width: 380px; width: 100%; }
  .timeline-row.left .timeline-dot { grid-column: 2; justify-self: center; }
  .timeline-row.left .timeline-spacer { grid-column: 3; }
  .timeline-row.right .timeline-spacer { grid-column: 1; }
  .timeline-row.right .timeline-dot { grid-column: 2; justify-self: center; }
  .timeline-row.right .timeline-card { grid-column: 3; justify-self: start; max-width: 380px; width: 100%; }
  .timeline-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--bg-deep); box-shadow: 0 0 10px currentColor; z-index: 2; position: relative; flex-shrink: 0; }
  .dot-inner { position: absolute; inset: 3px; border-radius: 50%; background: white; opacity: 0.8; }
  .timeline-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden;
    cursor: pointer; transition: all 0.25s; text-align: right; display: flex; align-items: center;
  }
  .timeline-card:hover { background: var(--glass-hover); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .tc-accent { width: 4px; align-self: stretch; flex-shrink: 0; }
  .tc-body { padding: 14px 16px; flex: 1; }
  .tc-order { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
  .tc-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
  .tc-en { font-size: 0.72rem; color: var(--text-muted); direction: ltr; margin-bottom: 4px; }
  .tc-period { font-size: 0.75rem; color: var(--text-secondary); }
  .tc-arrow { color: var(--text-muted); margin-left: 10px; margin-right: 6px; transition: transform 0.2s; flex-shrink: 0; }
  .tc-arrow.open { transform: rotate(-90deg); }

  /* Artists Drawer */
  .artists-drawer {
    position: fixed; top: var(--navbar-h); left: 0; bottom: 0; width: 380px; z-index: 200;
    display: flex; flex-direction: column; overflow: hidden;
    border-right: 1px solid var(--glass-border); border-radius: 0;
    background: rgba(5, 15, 35, 0.92); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    box-shadow: 4px 0 32px rgba(0,0,0,0.5);
  }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 2px solid; flex-shrink: 0; }
  .drawer-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
  .drawer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .drawer-title { font-size: 1.3rem; font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
  .drawer-period { font-size: 0.75rem; color: var(--text-muted); }
  .drawer-close { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary); border-radius: 8px; padding: 7px; cursor: pointer; transition: all 0.2s; display: flex; flex-shrink: 0; }
  .drawer-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }
  .drawer-desc { padding: 14px 20px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
  .drawer-artists-heading { display: flex; align-items: center; gap: 7px; padding: 12px 20px 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; border-bottom: 1px solid var(--glass-border); }
  .drawer-artists-list { flex: 1; overflow-y: auto; padding: 8px 10px 20px; display: flex; flex-direction: column; gap: 4px; }
  .drawer-artists-list::-webkit-scrollbar { width: 4px; }
  .drawer-artists-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .drawer-artist-row { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; text-decoration: none; color: inherit; background: transparent; border: 1px solid transparent; transition: all 0.15s; cursor: pointer; }
  .drawer-artist-row:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); }
  .drawer-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; flex-shrink: 0; }
  .drawer-artist-info { flex: 1; min-width: 0; }
  .drawer-artist-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drawer-artist-sub { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drawer-arrow { color: var(--text-muted); flex-shrink: 0; }
  .drawer-empty { padding: 30px 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
  .drawer-overlay { position: fixed; inset: 0; top: var(--navbar-h); background: rgba(0,0,0,0.4); z-index: 199; display: none; }
  .drawer-overlay.show { display: block; }

  /* Artist Page */
  .artist-page { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
  .artist-hero { display: flex; gap: 28px; padding: 28px; margin-bottom: 32px; }
  .ah-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
  .ah-initials {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; font-weight: 800; color: white;
  }
  .ah-info { flex: 1; }
  .ah-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
  .ah-name-en { font-size: 0.95rem; color: var(--text-muted); direction: ltr; margin-bottom: 14px; }
  .ah-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .ah-badge { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); font-size: 0.8rem; color: var(--text-secondary); }
  .ah-bio { font-size: 0.93rem; line-height: 1.9; color: var(--text-secondary); }
  .artworks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 16px; }
  .artwork-card { overflow: hidden; }
  .artwork-img { width: 100%; height: 180px; object-fit: cover; }
  .artwork-info { padding: 14px; }
  .artwork-title { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
  .artwork-year { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
  .artwork-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }
  .artwork-clickable { cursor: zoom-in; transition: opacity 0.2s; }
  .artwork-clickable:hover { opacity: 0.9; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.88rem; margin-bottom: 24px; transition: color 0.2s; padding: 8px 0; }
  .back-btn:hover { color: var(--blue-bright); }

  /* Articles Page */
  .articles-page { max-width: 1000px; margin: 0 auto; padding: 48px 24px 80px; }
  .page-header { text-align: center; margin-bottom: 48px; }
  .page-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
  .page-sub { color: var(--text-secondary); }
  .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .article-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .article-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  .article-cover { width: 100%; height: 200px; object-fit: cover; }
  .article-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
  .article-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; line-height: 1.5; }
  .article-excerpt { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.7; flex: 1; }
  .article-detail-page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
  .ad-cover { width: 100%; max-height: 360px; object-fit: cover; }
  .ad-body { padding: 32px; }
  .ad-title { font-size: 1.9rem; font-weight: 800; line-height: 1.4; margin-bottom: 16px; }
  .ad-date { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-muted); }
  .ad-excerpt { font-size: 1rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--glass-border); font-weight: 500; }
  .ad-content { font-size: 0.95rem; line-height: 2; color: var(--text-secondary); white-space: pre-wrap; }

  /* Admin Page */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { max-width: 420px; width: 100%; padding: 40px; text-align: center; }
  .login-icon { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 20px; background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3); display: flex; align-items: center; justify-content: center; color: var(--blue-bright); }
  .login-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .login-sub { color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 28px; }
  .login-form { text-align: right; display: flex; flex-direction: column; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
  .form-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-family: inherit; font-size: 0.88rem; outline: none; transition: border-color 0.2s; direction: rtl;
  }
  .form-input:focus { border-color: var(--blue-bright); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-textarea { width: 100%; padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.88rem; outline: none; transition: border-color 0.2s; resize: vertical; min-height: 80px; direction: rtl; }
  .form-textarea:focus { border-color: var(--blue-bright); }
  .form-select { padding: 10px 14px; border-radius: 10px; background: rgba(10,22,40,0.8); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.88rem; outline: none; cursor: pointer; direction: rtl; }
  .form-select:focus { border-color: var(--blue-bright); }
  .form-error { color: #f87171; font-size: 0.82rem; text-align: center; }
  .color-picker { width: 48px; height: 40px; border-radius: 8px; border: 1px solid var(--glass-border); cursor: pointer; background: none; padding: 2px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-row .form-input, .form-row .form-select { flex: 1; min-width: 140px; }
  .form-row-inline { align-items: center; justify-content: space-between; }

    .ah-meta { justify-content: center; }
    .search-bar { max-width: 200px; }
    .search-dropdown { width: 320px; right: -50px; }
    .artists-drawer { width: 100%; }

// ── State Management ──
let state = {
  page: 'home',
  params: {},
  token: localStorage.getItem('dibache_token') || null,
  username: localStorage.getItem('dibache_user') || null,
  lightboxIndex: null,
  lightboxImages: [],
  searchQuery: '',
  searchResults: null,
  searchLoading: false,
  uploads: JSON.parse(localStorage.getItem('dibache_uploads') || '[]'),
};

const listeners = new Set();
function setState(updater) {
  if (typeof updater === 'function') state = { ...state, ...updater(state) };
  else state = { ...state, ...updater };
  listeners.forEach(fn => fn(state));
}
function useGlobalState() {
  const [s, setS] = useState(state);
  useEffect(() => {
    const fn = ns => setS({ ...ns });
    listeners.add(fn);
    return () => listeners.delete(fn);
  }, []);
  return s;
}

function navigate(page, params = {}) {
  setState({ page, params });
  window.scrollTo(0, 0);
}

function getArtistArtworks(artistId) {
  return ARTWORKS.filter(a => a.artistId === artistId);
}

function getStyleArtists(styleId) {
  return ARTISTS.filter(a => a.styleId === styleId);
}

function searchData(q) {
  const pattern = q.toLowerCase();
  const styles = STYLES.filter(s => s.name.includes(q) || s.nameEn.toLowerCase().includes(pattern) || s.period.includes(q)).slice(0, 10);
  const artists = ARTISTS.filter(a => a.name.includes(q) || a.nameEn.toLowerCase().includes(pattern) || a.nationality.includes(q) || a.bio.includes(q)).slice(0, 10);
  const artworks = ARTWORKS.filter(aw => aw.title.includes(q) || aw.titleEn.toLowerCase().includes(pattern) || aw.description.includes(q)).slice(0, 10);
  return { styles, artists, artworks, query: q };
}

// ── SearchBar Component ──
function SearchBar() {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const inputRef = useRef(null);
  const containerRef = useRef(null);

  useEffect(() => {
    const handler = setTimeout(() => {
      if (query.trim().length >= 2) {
        setLoading(true);
        const r = searchData(query.trim());
        setResults(r);
        setLoading(false);
      } else {
        setResults(null);
      }
    }, 300);
    return () => clearTimeout(handler);
  }, [query]);

  useEffect(() => {
    function onClick(e) {
      if (containerRef.current && !containerRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);

  function goToResult(type, id) {
    setOpen(false); setQuery(''); setResults(null);
    if (type === 'style') navigate('styles');
    else if (type === 'artist') navigate('artist', { id });
    else if (type === 'artwork') {
      const aw = ARTWORKS.find(a => a.id === id);
      if (aw) navigate('artist', { id: aw.artistId });
    }
  }

  const total = (results?.styles?.length || 0) + (results?.artists?.length || 0) + (results?.artworks?.length || 0);

  return (
    <div ref={containerRef} className="search-container">
      <div className={`search-bar ${open ? 'open' : ''}`}>
        <Icon name="search" size={16} />
        <input
          ref={inputRef}
          type="text"
          placeholder="جستجو در هنرمندان، سبک‌ها و آثار..."
          value={query}
          onChange={e => { setQuery(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          className="search-input"
        />
        {query && (
          <button className="search-clear" onClick={() => { setQuery(''); setResults(null); inputRef.current?.focus(); }}>
            <Icon name="x" size={14} />
          </button>
        )}
      </div>
      {open && (query.trim().length >= 2 || results) && (
        <div className="search-dropdown">
          {loading ? (
            <div className="search-loading"><div className="spinner" style={{ width: 24, height: 24 }} /></div>
          ) : total === 0 ? (
            <p className="search-empty">نتیجه‌ای یافت نشد</p>
          ) : (
            <>
              {results?.styles?.length > 0 && (
                <div className="search-group">
                  <div className="search-group-title"><Icon name="palette" size={13} /> سبک‌ها</div>
                  {results.styles.map(s => (
                    <button key={s.id} className="search-item" onClick={() => goToResult('style', s.id)}>
                      <span className="search-dot" style={{ background: s.color }} />
                      <span className="search-item-name">{s.name}</span>
                      <span className="search-item-meta">{s.period}</span>
                    </button>
                  ))}
                </div>
              )}
              {results?.artists?.length > 0 && (
                <div className="search-group">
                  <div className="search-group-title"><Icon name="users" size={13} /> هنرمندان</div>
                  {results.artists.map(a => (
                    <button key={a.id} className="search-item" onClick={() => goToResult('artist', a.id)}>
                      <span className="search-avatar">{a.name?.charAt(0)}</span>
                      <span className="search-item-name">{a.name}</span>
                      <span className="search-item-meta">{a.nationality}</span>
                    </button>
                  ))}
                </div>
              )}
              {results?.artworks?.length > 0 && (
                <div className="search-group">
                  <div className="search-group-title"><Icon name="image" size={13} /> آثار</div>
                  {results.artworks.map(aw => (
                    <button key={aw.id} className="search-item" onClick={() => goToResult('artwork', aw.id)}>
                      <span className="search-item-name">{aw.title}</span>
                      <span className="search-item-meta">{aw.year}</span>
                    </button>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── ImageUpload Component ──
function ImageUpload({ value, onChange, label = "تصویر" }) {
  const [uploading, setUploading] = useState(false);
  const [done, setDone] = useState(false);
  const inputRef = useRef(null);

  const handleFile = async (file) => {
    if (!file.type.startsWith('image/')) return;
    setUploading(true); setDone(false);
    // Simulate upload with file reader
    try {
      const reader = new FileReader();
      reader.onloadend = () => {
        const url = reader.result;
        onChange(url);
        setDone(true);
        setTimeout(() => setDone(false), 1500);
        // Save to localStorage uploads
        const uploads = JSON.parse(localStorage.getItem('dibache_uploads') || '[]');
        uploads.push({ name: file.name, url, size: file.size, date: new Date().toISOString() });
        localStorage.setItem('dibache_uploads', JSON.stringify(uploads));
      };
      reader.readAsDataURL(file);
    } catch (e) {
      console.error('Upload failed', e);
    } finally {
      setUploading(false);
    }
  };

  const onFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) handleFile(file);
    e.target.value = '';
  };

  const clear = () => onChange('');

  return (
    <div className="image-upload">
      <label className="form-label">{label}</label>
      {value ? (
        <div className="upload-preview">
          <img src={value} alt="preview" className="upload-preview-img" />
          <button className="upload-remove" onClick={clear} type="button">
            <Icon name="x" size={14} />
          </button>

        </div>
      ) : (
        <button className="upload-trigger" onClick={() => inputRef.current?.click()} type="button" disabled={uploading}>
          {uploading ? (

          ) : (

// ── Lightbox Component ──
function Lightbox({ images, initialIndex, onClose }) {
  const [idx, setIdx] = useState(initialIndex);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

  const current = images[idx];

  const prev = useCallback(() => {
    setIdx(i => i > 0 ? i - 1 : images.length - 1);
    setZoom(1); setPan({ x: 0, y: 0 });
  }, [images.length]);

  const next = useCallback(() => {
    setIdx(i => i < images.length - 1 ? i + 1 : 0);
    setZoom(1); setPan({ x: 0, y: 0 });
  }, [images.length]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose, prev, next]);

  const onWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    setZoom(z => Math.max(1, Math.min(4, z + delta)));
  };

  const onMouseDown = (e) => {
    if (zoom > 1) { setIsDragging(true); setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y }); }
  };
  const onMouseMove = (e) => {
    if (isDragging && zoom > 1) setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
  };
  const onMouseUp = () => setIsDragging(false);

  return (
    <div className="lightbox fade-in">
      <div className="lightbox-backdrop" onClick={onClose} />
      <div className="lightbox-toolbar">
        <span className="lightbox-counter">{idx + 1} / {images.length}</span>
        <div className="lightbox-tools">
          <button onClick={() => setZoom(z => Math.max(1, z - 0.25))} disabled={zoom <= 1}><Icon name="zoomOut" size={18} /></button>
          <span className="lightbox-zoom">{Math.round(zoom * 100)}%</span>
          <button onClick={() => setZoom(z => Math.min(4, z + 0.25))} disabled={zoom >= 4}><Icon name="zoomIn" size={18} /></button>
        </div>
        <button className="lightbox-close" onClick={onClose}><Icon name="x" size={20} /></button>
      </div>
      {images.length > 1 && (
        <>
          <button className="lightbox-nav lightbox-prev" onClick={prev}><Icon name="chevronLeft" size={28} /></button>
          <button className="lightbox-nav lightbox-next" onClick={next}><Icon name="chevronRight" size={28} /></button>
        </>
      )}
      <div className="lightbox-stage" onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
        <img
          key={current.src}
          src={current.src}
          alt={current.title || ''}
          className="lightbox-img"
          style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, cursor: zoom > 1 ? (isDragging ? 'grabbing' : 'grab') : 'zoom-in' }}
          draggable={false}
        />
      </div>
      {(current.title || current.year || current.description) && (
        <div className="lightbox-caption">
          {current.title && <h3 className="lightbox-title">{current.title}</h3>}
          {current.year && <span className="lightbox-year">{current.year}</span>}
          {current.description && <p className="lightbox-desc">{current.description}</p>}
        </div>
      )}
    </div>
  );
}

          </select>
        </div>
        <ImageUpload label="تصویر هنرمند" value={form.photoUrl} onChange={url => setForm(p => ({ ...p, photoUrl: url }))} />
        <textarea className="form-textarea" placeholder="بیوگرافی" value={form.bio} onChange={e => setForm(p => ({ ...p, bio: e.target.value }))} />
        <button className="btn-primary" disabled={!form.name}>
          <Icon name="plus" size={15} /> افزودن
        </button>
      </div>
      <div className="admin-list">
        {ARTISTS.map(a => (
          <div key={a.id} className="admin-row glass">
            <div className="artist-row-avatar">{a.name?.charAt(0)}</div>
            <span className="row-name">{a.name}</span>
            <span className="row-meta">{a.nationality}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ArtworksAdmin() {
  const [form, setForm] = useState({ title: '', titleEn: '', year: '', imageUrl: '', description: '', artistId: '' });
  return (
    <div className="admin-section">
      <div className="admin-form glass">
        <h3 className="form-section-title"><Icon name="plus" size={16} /> افزودن اثر هنری</h3>
        <div className="form-row">
          <input className="form-input" placeholder="عنوان فارسی *" value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value }))} />
          <input className="form-input" placeholder="عنوان انگلیسی" value={form.titleEn} onChange={e => setForm(p => ({ ...p, titleEn: e.target.value }))} />
          <input className="form-input" placeholder="سال اثر" value={form.year} onChange={e => setForm(p => ({ ...p, year: e.target.value }))} />
          <select className="form-select" value={form.artistId} onChange={e => setForm(p => ({ ...p, artistId: e.target.value }))}>
            <option value="">انتخاب هنرمند</option>
            {ARTISTS.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
        <ImageUpload label="تصویر اثر" value={form.imageUrl} onChange={url => setForm(p => ({ ...p, imageUrl: url }))} />
        <textarea className="form-textarea" placeholder="توضیح اثر" value={form.description} onChange={e => setForm(p => ({ ...p, description: e.target.value }))} />
        <button className="btn-primary" disabled={!form.title}>
          <Icon name="plus" size={15} /> افزودن
        </button>
      </div>
      <div className="artworks-admin-grid">
        {ARTWORKS.map(aw => (
          <div key={aw.id} className="artwork-admin-card glass">
            {aw.imageUrl && <img src={aw.imageUrl} alt={aw.title} className="aw-thumb" />}
            <div className="aw-info">
              <p className="aw-title">{aw.title}</p>
              <p className="aw-year">{aw.year}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ArticlesAdmin() {
  const [form, setForm] = useState({ title: '', slug: '', excerpt: '', content: '', coverUrl: '', published: false });
  const autoSlug = (title) => title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\u0600-\u06FF-]/g, '').slice(0, 60);

  return (
    <div className="admin-section">
      <div className="admin-form glass">
        <h3 className="form-section-title"><Icon name="plus" size={16} /> نوشتن مقاله جدید</h3>
        <div className="form-row">
          <input className="form-input" placeholder="عنوان مقاله *" value={form.title} onChange={e => setForm(p => ({ ...p, title: e.target.value, slug: autoSlug(e.target.value) }))} />
          <input className="form-input" placeholder="slug (خودکار)" value={form.slug} onChange={e => setForm(p => ({ ...p, slug: e.target.value }))} />
        </div>
        <ImageUpload label="تصویر کاور مقاله" value={form.coverUrl} onChange={url => setForm(p => ({ ...p, coverUrl: url }))} />
        <textarea className="form-textarea" placeholder="خلاصه مقاله" value={form.excerpt} onChange={e => setForm(p => ({ ...p, excerpt: e.target.value }))} rows={2} />
        <textarea className="form-textarea" placeholder="متن کامل مقاله *" value={form.content} onChange={e => setForm(p => ({ ...p, content: e.target.value }))} rows={8} />
        <div className="form-row form-row-inline">
          <label className="checkbox-label">
            <input type="checkbox" checked={form.published} onChange={e => setForm(p => ({ ...p, published: e.target.checked }))} />
            <span>منتشر شود</span>
          </label>
          <button className="btn-primary" disabled={!form.title || !form.slug || !form.content}>
            <Icon name="plus" size={15} /> ذخیره مقاله
          </button>
        </div>
      </div>
      <div className="admin-list">
        {ARTICLES.map(art => (
          <div key={art.id} className="admin-row glass">
            <div className={`published-dot ${art.published ? 'pub' : ''}`} />
            <span className="row-name">{art.title}</span>
            <span className="row-meta">{art.published ? 'منتشر شده' : 'پیش‌نویس'}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Not Found ──
function NotFound() {
  return (
    <div className="page-loading">
      <h1>۴۰۴</h1>
      <p>صفحه مورد نظر یافت نشد</p>
      <a href="#" className="btn-primary" onClick={e => { e.preventDefault(); navigate('home'); }}>بازگشت به خانه</a>
    </div>
  );
}

// ── Router ──
function Router() {
  const s = useGlobalState();

  return (
    <div className="app-shell">
      <Navbar />
      <main className="app-main">
        {s.page === 'home' && <HomePage />}
        {s.page === 'styles' && <StylesPage />}
        {s.page === 'artist' && <ArtistPage id={s.params.id} />}
        {s.page === 'articles' && <ArticlesPage />}
        {s.page === 'article-detail' && <ArticleDetailPage slug={s.params.slug} />}
        {s.page === 'admin' && <AdminPage />}
      </main>
    </div>
  );
}

// ── App ──
function App() {
  return <Router />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
